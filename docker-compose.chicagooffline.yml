# chicagooffline.com deployment compose
# Builds CoreScope from this fork for dev-scope.chicagooffline.com
# External Caddy handles TLS/routing — DISABLE_CADDY=true here.
#
# Usage:
#   docker compose -f docker-compose.chicagooffline.yml build
#   docker compose -f docker-compose.chicagooffline.yml up -d

services:
  corescope-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-chicagooffline}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: corescope-chicagooffline:latest
    container_name: corescope-dev
    restart: unless-stopped
    stop_grace_period: 30s
    stop_signal: SIGTERM
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - DISABLE_CADDY=true
      - DISABLE_MOSQUITTO=true
    volumes:
      - ${DEV_DATA_DIR:-~/corescope-dev-data}:/app/data
    networks:
      - chicagooffline-net

networks:
  chicagooffline-net:
    external: true
